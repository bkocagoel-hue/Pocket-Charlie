; ============================================================================
;  Pocket Charlie - PlatformIO Project Configuration
;
;  Ziel-Hardware : M5Stack CoreS3 (ESP32-S3)
;  Framework     : Arduino (laeuft auf ESP-IDF / FreeRTOS)
;  HAL / Grafik  : M5Unified (+ M5GFX als Abhaengigkeit)
;
;  Diese Datei ist die "Single Source of Truth" fuer den Build.
;  Umgebungen ([env:...]) trennen wir spaeter sauber (z. B. debug/release).
; ============================================================================

[platformio]
; Standard-Umgebung, die ohne Argument gebaut/geflasht wird.
default_envs = cores3

; ----------------------------------------------------------------------------
;  Gemeinsame Basis-Einstellungen
;  ([env]-Sektion wird von JEDER konkreten Umgebung geerbt -> DRY)
; ----------------------------------------------------------------------------
[env]
platform  = espressif32
framework  = arduino

; --- Serieller Monitor ---------------------------------------------------
monitor_speed   = 115200
monitor_filters =
    esp32_exception_decoder  ; uebersetzt Crash-Adressen in lesbare Stacktraces
    time                     ; Zeitstempel pro Zeile

; --- Bibliotheken --------------------------------------------------------
; M5Unified zieht M5GFX automatisch als Abhaengigkeit nach.
; Bewusst (noch) UNGEPINNT: Beim allerersten Build soll der Resolver die
; aktuellste stabile Version ziehen. TODO (Tech-Lead-Regel): direkt nach dem
; ersten gruenen Build die exakte Version aus `pio pkg list` hier eintragen,
; z. B.  m5stack/M5Unified@0.2.x  -> reproduzierbare Builds.
lib_deps =
    m5stack/M5Unified

; --- Library Dependency Finder ------------------------------------------
; deep+ stellt sicher, dass externe Libs (M5Unified) auch dann gefunden
; werden, wenn sie nur aus unseren eigenen lib/-Modulen referenziert werden.
lib_ldf_mode = deep+

; --- Build-Flags ---------------------------------------------------------
build_flags =
    -DCORE_DEBUG_LEVEL=3     ; ESP-IDF Log-Level (0=aus ... 5=verbose)

; ----------------------------------------------------------------------------
;  Konkrete Umgebung: CoreS3
; ----------------------------------------------------------------------------
[env:cores3]
board = m5stack-cores3
